# Horizontal Pod Autoscaler — scales pods based on CPU & memory
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: email-mcp-hpa
  namespace: email-mcp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: email-mcp-app
  minReplicas: 2                   # Always keep at least 2 pods
  maxReplicas: 10                  # Scale up to 10 under heavy load
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60   # Scale up when CPU > 60%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70   # Scale up when memory > 70%
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60        # Add max 2 pods per minute
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120       # Remove max 1 pod every 2 min (conservative)
